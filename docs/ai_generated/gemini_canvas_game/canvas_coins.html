<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Canvas Game - Collect the Coins</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }

        canvas {
            border: 4px solid #fff;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div id="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        // Grid size 
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Player position
        let playerX = 10;
        let playerY = 10;

        // Coin position
        let coinX = 5;
        let coinY = 5;

        // Game stats
        let score = 0;

        // Game loop control
        let gameSpeed = 125; // Milliseconds between frames
        let intervalId;

        // Keyboard controls
        let xVelocity = 0;
        let yVelocity = 0;

        function startGame() {
            // Start moving right by default
            xVelocity = 1;
            yVelocity = 0;
            placeCoin();

            // Listen for keys
            document.addEventListener("keydown", changeDirection);

            // Run game loop
            intervalId = setInterval(drawGame, gameSpeed);
        }

        function drawGame() {
            clearCanvas();
            movePlayer();
            drawPlayer();
            drawCoin();
            checkCoinCollision();
        }

        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw subtle grid lines
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = "#3498db"; // Blue square
            ctx.fillRect(playerX * gridSize, playerY * gridSize, gridSize - 2, gridSize - 2);
        }

        function drawCoin() {
            ctx.fillStyle = "#f1c40f"; // Gold coin
            ctx.beginPath();
            ctx.arc(
                (coinX * gridSize) + (gridSize / 2),
                (coinY * gridSize) + (gridSize / 2),
                (gridSize / 3),
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function movePlayer() {
            playerX += xVelocity;
            playerY += yVelocity;

            // Wrap around screen boundaries
            if (playerX < 0) playerX = tileCount - 1;
            if (playerX >= tileCount) playerX = 0;
            if (playerY < 0) playerY = tileCount - 1;
            if (playerY >= tileCount) playerY = 0;
        }

        function changeDirection(event) {
            // Arrow Keys
            if (event.code === "ArrowUp" && yVelocity !== 1) {
                xVelocity = 0; yVelocity = -1;
            } else if (event.code === "ArrowDown" && yVelocity !== -1) {
                xVelocity = 0; yVelocity = 1;
            } else if (event.code === "ArrowLeft" && xVelocity !== 1) {
                xVelocity = -1; yVelocity = 0;
            } else if (event.code === "ArrowRight" && xVelocity !== -1) {
                xVelocity = 1; yVelocity = 0;
            }
        }

        function placeCoin() {
            // Randomly place coin on the grid
            coinX = Math.floor(Math.random() * tileCount);
            coinY = Math.floor(Math.random() * tileCount);
        }

        function checkCoinCollision() {
            if (playerX === coinX && playerY === coinY) {
                score += 10;
                scoreEl.innerText = score;
                placeCoin();
            }
        }

        startGame();
    </script>

</body>

</html>
