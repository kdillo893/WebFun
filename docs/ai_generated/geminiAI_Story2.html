<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified CYOA Game</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <p id="story-text">Loading...</p>
        <div id="options-container"></div>
    </div>

    <script>
        // 1. Single state variable tracking where the player is
        let currentState = "start";

        const storyElement = document.getElementById("story-text");
        const optionsContainer = document.getElementById("options-container");

        // 2. Main game loop function that builds the screen based on the current state
        function renderGame() {
            // Clear out old buttons
            optionsContainer.innerHTML = "";

            // 3. Centralized game logic using a basic switch statement
            switch (currentState) {
                case "start":
                    storyElement.textContent = "You stand at a crossroads. Left goes to a dark cave, right goes to a sunny field.";
                    createOption("Go to the cave", "cave");
                    createOption("Go to the field", "field");
                    break;

                case "cave":
                    storyElement.textContent = "You enter the cave and disturb a sleeping dragon! Game Over.";
                    createOption("Play Again", "start");
                    break;

                case "field":
                    storyElement.textContent = "You find a beautiful meadow and live peacefully forever. You Win!";
                    createOption("Play Again", "start");
                    break;
            }
        }

        // Helper function to easily generate buttons and update state on click
        function createOption(buttonText, nextState) {
            const button = document.createElement("button");
            button.textContent = buttonText;
            button.addEventListener("click", () => {
                currentState = nextState; // Update state tracking variable
                renderGame();             // Re-run the loop to show the new screen
            });
            optionsContainer.appendChild(button);
        }

        // Run the game on page load
        renderGame();
    </script>
</body>

</html>
