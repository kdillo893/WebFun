<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <h1>My password game</h1>
    <input id="password" placeholder="Enter password here . . . "></input>
    <br>
    <br>
    <button onclick="check()" style="height: 30px; width:70px; background-color: green;">Submit</button>
    <h1 id="secret" style="color:blue; visibility: hidden;">Banana</h1>
    <script>
        let password = "banana"

        function check() {
            let userinput = document.getElementById("password");
            if (userinput.value == password) {
                document.getElementById("secret").style.visibility = "visible";
            }
            else {
                alert("YOURE WRONG TRY AGAIN")
            }
        }
    </script>
</body>

</html>
