<!DOCTYPE html>
<html>

<head>
    <title>JS Intro Review</title>
</head>

<body>

    <div>
        <input id="password" />
        <button onclick="guessPassword()">Guess</button>

        <div id="output"></div>
    </div>

    <h2>Calculator</h2>
    <div>
        <input type="number" id="num1" />
        <input type="number" id="num2" />
        <button onclick="addNumbers()">+</button>
        <button onclick="multiplyNumbers()">*</button>
        <button onclick="divideNumbers()">/</button>
        <button onclick="subtractNumbers()">-</button>

        <div id="results"></div>
    </div>

    <script>
        const password = "my_secret_password";

        function guessPassword() {
            let input = document.getElementById("password");

            console.log(input.value)

            let output = document.getElementById("output");
            if (password == input.value) {
                // alert("You guessed it!");
                output.innerText = "You guessed my password"
            } else {
                // alert("try again!");
                output.innerText = "That's not the password, try again"
            }
        }

        function addNumbers() {
            let num1 = document.getElementById("num1");
            let num2 = document.getElementById("num2");

            let num1Value = num1.valueAsNumber;
            let num2Value = num2.valueAsNumber;

            let results = document.getElementById("results");
            results.innerText = num1Value + num2Value;
        }
        function multiplyNumbers() {
            let num1 = document.getElementById("num1");
            let num2 = document.getElementById("num2");

            let num1Value = num1.valueAsNumber;
            let num2Value = num2.valueAsNumber;

            let results = document.getElementById("results");
            results.innerText = num1Value * num2Value;
        }

    </script>
</body>

</html>
