<!DOCTYPE html>
<html>

<head>
    <title>JS Strings Review</title>
</head>

<body>

    <pre id="words"></pre>
    <script>
        let word = "1234567890";

        const wordElement = document.getElementById("words");
        wordElement.innerText = word.trim();

        wordElement.innerText = word.indexOf("5");


        //convert to uppercase, console out.


    </script>
</body>

</html>
