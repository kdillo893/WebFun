<!DOCTYPE html>
<html>

<head>
    <title>PHP Guess Password</title>
    <script>
        async function guessPassword() {
            const url = "http://localhost/guessPassword.php";

            //get the input, escape it using url search parms, then prepare it for a request
            let fetchParms = new URLSearchParams({
                password: passwdInput
            })

            const passwdInput = document.getElementById("passwd");
            const request = `${url}?${fetchParms.toString()}`;

            //fetch request, handle response and error
            fetch(request).then(async (response) => {
                if (response == null) {
                    return;
                }

                console.log(response);

                const results = document.getElementById("result");
                const reader = response.body.getReader();

                const decoder = new TextDecoder("utf-8");

                let output = "";
                while (true) {
                    const { done, value } = await reader.read();

                    if (done) {
                        console.log("Stream complete")
                        break;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    // console.log("Received chunk: ", chunk);
                    output += chunk;
                }

                if (output.length > 0) {
                    results.innerText = output;
                }
            }).catch((error) => {
                // do something with the error eventually...
            });
        }
    </script>
</head>

<body>
    <form action="guessPassword.php">

        <input type="text" name="passwd" id="passwd">
        <button type="submit">Guess</button>
        <div id="result"></div>
    </form>
</body>

</html>
