<!DOCTYPE html>
<!-- from pokemon https://pokeapi.co/ -->
<html lang="en">

<head>
    <title>Pokemon API Caller</title>

    <script src="js/async.js"></script>

    <script type="module">
        import { Pokedex } from "https://cdn.jsdelivr.net/gh/pokeapi/pokeapi-js-wrapper@2.0.2/src/index.js"
        const pokedex = await Pokedex.init();
        // const version = await pokedex.getVersionByName(1)
        // console.log(version);


        // with await, be sure to be in an async function (and in a try/catch)
        (async () => {
            const golduck = await pokedex.getPokemonByName("golduck")
            console.log(golduck)
        })()

        // or with Promises
        pokedex.getPokemonByName("eevee")
            .then(function (response) {
                console.log(response)
            })

        pokedex.resource([
            "/api/v2/pokemon/36",
            "api/v2/berry/8",
            "https://pokeapi.co/api/v2/ability/9/",
        ]).then(response => {
            console.log(response)
        })
    </script>
</head>

</html>
