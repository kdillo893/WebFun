<head>

    <style>
        #gridbox {
            height: 400px;
            width: 400px;

            display: grid;
            /* grid: 1fr 1fr 1fr / 1fr 1fr 1fr; */
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;

        }

        #gridbox div {
            border: 1px solid black;
            /* min-height: 10px; */

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 100px;
            text-align: center;
        }

        /** optional */
        #gridbox div:hover {
            background-color: aqua;
        }
    </style>
</head>

    <div id="gridbox">
        <div onclick="insertPlayer(this)"></div>
        <div onclick="insertPlayer(this)"></div>

        <div onclick="insertPlayer(this)"></div>
    </div>
    
    <button onclick="resetGame()">Reset</button>

    <script>
        // function insertPlayer(element) {
        //     console.log(element);
        //     element.innerText = "X";
        // }




        let turn = "X";
        function insertPlayer(element) {
            if (element.innerText.length > 0) {
                return;
            }

            element.innerText = turn;
            if (turn == "X") {
                turn = "O";
            } else {
                turn = "X";
            }
        }

        function resetGame() {
            turn = "X";

            let gridBox = document.getElementById("gridbox");
            let divsInGrid = gridBox.getElementsByTagName("div");

          


            for (let i = 0; i < divsInGrid.length; i++) {
                let div = divsInGrid[i];
                div.innerText = "";
            }
        }

        /**
         * Extension from before, using event listeners on ALL

    </script>


    <script>
        function changeGrid() {
            const gridBox = document.getElementById("gridbox");

            const columns = 5;
            const rows = 4;
            // gridBox.innerHTML = "";
            for (let i = 0; i < (rows * columns); i++) {
                const newDiv = document.createElement("div");
                gridBox.appendChild(newDiv);
            }
        }
    </script>
    <button onclick="changeGrid()">Funny button</button>
</body>
